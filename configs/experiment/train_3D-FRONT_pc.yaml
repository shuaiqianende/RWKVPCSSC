# @package _global_

defaults:
  - override /data: 3D-FRONT_pc
  - override /model: 3D-FRONT_pc
  - override /callbacks: default
  - override /trainer: gpu

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["3D-FRONT_pc", "RWKVPCSSC"]

seed: 555

trainer:
  devices: [2]

data:
  batch_size: 8
  num_workers: 32

logger:
  wandb:
    tags: ${tags}
    group: ${model.dataset}

