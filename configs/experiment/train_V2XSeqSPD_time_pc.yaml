# @package _global_

defaults:
  - override /data: V2XSeqSPD-time-split
  - override /model: V2XSeqSPD_pc
  - override /callbacks: default
  - override /trainer: gpu

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["V2XSeqSPD-time-split", "RWKVPCSSC"]

seed: 555

trainer:
  devices: [2, 3]

data:
  batch_size: 2
  num_workers: 32

logger:
  wandb:
    tags: ${tags}
    group: ${model.dataset}
