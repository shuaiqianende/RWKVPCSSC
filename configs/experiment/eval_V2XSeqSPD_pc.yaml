# @package _global_

defaults:
  - override /data: V2XSeqSPD-scene-split
  - override /model: V2XSeqSPD_pc
  - override /trainer: gpu
# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["V2XSeqSPD_pc", "RWKVPCSSC", "eval"]

seed: 555

trainer:
  devices: [0, 1, 2, 3]

data:
  batch_size: 1
  num_workers: 32

model:
  loss:
    sqrt: False

logger:
  wandb:
    tags: ${tags}
    group: ${model.dataset}

ckpt_path: /Path
