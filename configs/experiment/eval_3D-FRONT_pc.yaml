# @package _global_

defaults:
  - override /data: 3D-FRONT_pc
  - override /model: 3D-FRONT_pc
  - override /trainer: gpu

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["3D-FRONT_pc", "RWKVPCSSC", "eval"]

seed: 555

trainer:
  devices: [1]

data:
  batch_size: 8
  num_workers: 0

model:
  loss:
    sqrt: False

logger:
  wandb:
    tags: ${tags}
    group: ${model.dataset}

ckpt_path: /Path
