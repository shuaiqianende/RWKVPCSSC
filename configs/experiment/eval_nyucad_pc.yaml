# @package _global_

defaults:
  - override /data: nyucad_pc_v2
  - override /model: nyucad_pc
  - override /trainer: gpu

# all parameters below will be merged with parameters from default configurations set above
# this allows you to overwrite only specified parameters

tags: ["nyucad_pc", "RWKVPCSSC", "eval"]

seed: 555

trainer:
  devices: [3]

data:
  batch_size: 4
  num_workers: 32

model:
  loss:
    sqrt: False

logger:
  wandb:
    tags: ${tags}
    group: ${model.dataset}

ckpt_path: /Path


